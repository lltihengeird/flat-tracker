    body::before { left: -30px; }

    header {
      background: linear-gradient(135deg, #c9a96e, #e8d5b0, #c9a96e);
      padding: 22px 32px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      border-bottom: 2px solid #5c3d1e;
    }

    header h1 {
      font-family: 'Cinzel Decorative', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #3d2008;
      text-align: center;
    }

    /* ---- FILTER BAR ---- */
    .filter-bar {
      padding: 14px 32px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      flex-wrap: wrap;
      gap: 20px 32px;
      align-items: center;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-group > .filter-title {
      font-size: .82rem;
      font-weight: 600;
      color: #555;
      white-space: nowrap;
    }
    .filter-val {
      font-weight: 700;
      color: #0f3460;
      font-size: .82rem;
      white-space: nowrap;
      min-width: 74px;
    }

    /* simple single range */
    input[type=range].simple-range {
      -webkit-appearance: none;
      appearance: none;
      width: 130px;
      height: 4px;
      background: linear-gradient(to right, #0f3460 0%, #0f3460 var(--pct, 0%), #e5e7eb var(--pct, 0%), #e5e7eb 100%);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
      border: none;
    }
    input[type=range].simple-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      background: #0f3460;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
      cursor: pointer;
    }
    input[type=range].simple-range::-moz-range-thumb {
      width: 16px; height: 16px;
      background: #0f3460;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
      cursor: pointer;
    }

    /* dual range */
    .dual-range {
      position: relative;
      width: 160px;
      height: 16px;
    }
    .dual-range .range-bg {
      position: absolute;
      top: 6px; left: 0; right: 0;
      height: 4px;
      background: #e5e7eb;
      border-radius: 4px;
      pointer-events: none;
    }
    .dual-range .range-active {
      position: absolute;
      top: 6px;
      height: 4px;
      background: #0f3460;
      border-radius: 4px;
      pointer-events: none;
    }
    .dual-range input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      position: absolute;
      width: 100%;
      height: 4px;
      top: 6px;
      background: transparent;
      outline: none;
      border: none;
      pointer-events: none;
      margin: 0; padding: 0;
    }
    .dual-range input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      pointer-events: all;
      width: 16px; height: 16px;
      background: #0f3460;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
      cursor: pointer;
    }
    .dual-range input[type=range]::-moz-range-thumb {
      pointer-events: all;
      width: 16px; height: 16px;
      background: #0f3460;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
      cursor: pointer;
    }

    /* checkbox */
    .filter-checkbox {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      font-size: .84rem;
      color: #333;
      user-select: none;
    }
    .filter-checkbox input[type=checkbox] {
      width: 16px; height: 16px;
      cursor: pointer;
      accent-color: #0f3460;
    }

    /* ---- TOOLBAR ---- */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 32px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      flex-wrap: wrap;
    }
    .toolbar label { font-size: .85rem; color: #555; }
    .toolbar select {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: .85rem;
      outline: none;
      cursor: pointer;
    }
    .count-badge {
      margin-left: auto;
      background: #f0f2f5;
      border-radius: 20px;
      padding: 4px 14px;

// =====================================================================
// localStorage helpers
// =====================================================================
function getHidden() {
  try { return new Set(JSON.parse(localStorage.getItem(HIDDEN_KEY) || '[]')); }
  catch { return new Set(); }
}
function saveHidden(set) {
  localStorage.setItem(HIDDEN_KEY, JSON.stringify([...set]));
}
function hideOffer(id) {
  const h = getHidden(); h.add(String(id)); saveHidden(h);
  updateHiddenCount(); applyFilters();
}
function restoreOffer(id) {
  const h = getHidden(); h.delete(String(id)); saveHidden(h);
  updateHiddenCount(); applyFilters();
}
function updateHiddenCount() {
  const count = getHidden().size;
  const el = document.getElementById('hidden-count');
  el.textContent = count;
  el.style.display = count > 0 ? 'flex' : 'none';
}

// =====================================================================
// Geo / distance helpers
// =====================================================================
function distKm(lat, lng) {
  const R = 6371;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat - KREMLIN.lat);
  const dLng = toRad(lng  - KREMLIN.lng);
  const a = Math.sin(dLat / 2) ** 2
          + Math.cos(toRad(KREMLIN.lat)) * Math.cos(toRad(lat)) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function fmtDist(lat, lng) {
  if (lat == null || lng == null) return null;
  const km = distKm(lat, lng);
  return km < 1
    ? `📍 ${Math.round(km * 1000)} м до Кремля`
    : `📍 ${km.toFixed(1)} км до Кремля`;
}

function metroHtml(o) {
  if (!o.metro) return '';
  const color = metroColor(o.metro);
  const dot   = `<span class="metro-dot" style="background:${color}"></span>`;
  const time  = (o.metro_transport === 'walk' && o.metro_time)
    ? ` · ${o.metro_time} мин пешком` : '';
  return `<span class="geo-metro">${dot}${o.metro}${time}</span>`;
}

// =====================================================================
// Format helpers
// =====================================================================
function fmt(price) {
  if (!price) return '—';
  return Number(price).toLocaleString('ru-RU') + ' ₽/мес';
}
function noPhotoSvg() {
  return `<div class="no-photo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Нет фото</div>`;
}

// =====================================================================
// Slider track updates
// =====================================================================
function updatePriceTrack() {
  const minEl = document.getElementById('price-min');
  const maxEl = document.getElementById('price-max');
  const track = document.getElementById('price-active-track');
  const mn = Number(minEl.min), mx = Number(minEl.max);
  const lo = Number(minEl.value), hi = Number(maxEl.value);
  track.style.left  = ((lo - mn) / (mx - mn) * 100) + '%';
  track.style.width = ((hi - lo) / (mx - mn) * 100) + '%';
}
function updateAreaTrack() {
  const el = document.getElementById('area-min');
  const pct = (Number(el.value) - Number(el.min)) / (Number(el.max) - Number(el.min)) * 100;
  el.style.setProperty('--pct', pct + '%');
}

// =====================================================================
// Render — cards
// =====================================================================
function renderCards(offers) {
  const container = document.getElementById('cards');
  if (!offers.length) { container.innerHTML = ''; return; }
  const hidden = getHidden();

  container.innerHTML = offers.map(o => {
    const isHidden = hidden.has(String(o.id));
    const isNew    = newIds.has(String(o.id));
    const kremlinStr = fmtDist(o.lat, o.lng);
    const actionBtn  = isHidden
      ? `<button class="card-restore" data-id="${o.id}" title="Восстановить">↩</button>`
      : `<button class="card-dismiss" data-id="${o.id}" title="Скрыть">✕</button>`;

    const geoLeft  = metroHtml(o);
    const geoRight = kremlinStr ? `<span class="geo-kremlin">${kremlinStr}</span>` : '';
    const geoStrip = (geoLeft || geoRight)
      ? `<div class="card-geo">${geoLeft}${geoRight}</div>` : '';

    const imgContent = o.photo
      ? `<img src="${o.photo}" alt="фото" loading="lazy" onerror="this.parentNode.innerHTML='${noPhotoSvg().replace(/"/g,"'").replace(/\n/g,'')}'">`
      : noPhotoSvg();

    const score = calcBoostScore(o);
    const badgeCls = score >= 80 ? 'green' : score >= 60 ? 'yellow' : 'gray';
    const boostBadge = `<span class="boost-badge ${badgeCls}">${score}</span>`;

    const comm = o.commission != null ? Number(o.commission) : null;
    const commRow = comm != null
      ? `<div class="card-commission ${comm === 0 ? 'free' : 'paid'}">Комиссия: ${comm}%</div>`
      : '';

    const newLabel = isNew ? `<span class="new-card-badge">NEW</span>` : '';
    return `
    <div class="card${isHidden ? ' hidden-offer' : ''}">
      <div class="card-img-wrap">
        <a class="card-img-link" href="${o.url}" target="_blank" rel="noopener">${imgContent}</a>
        ${actionBtn}
        ${boostBadge}
        ${newLabel}
      </div>
      ${commRow}
      ${geoStrip}
      <div class="card-body">
        <div class="card-address">${o.address || '—'}</div>
        <div class="card-meta">
          ${o.area  ? `<span class="pill">${o.area} м²</span>` : ''}
          ${o.floor && o.floors_total ? `<span class="pill">${o.floor}/${o.floors_total} эт.</span>` : ''}
          ${o.rooms ? `<span class="pill">${o.rooms}-комн.</span>` : ''}
        </div>
        ${o.description ? `<p class="card-desc">${o.description}</p>` : ''}
      </div>
      <div class="card-footer">
        <div class="card-footer-price">${fmt(o.price)}</div>
      </div>
    </div>`;
  }).join('');
}

// =====================================================================
// Render — table
// =====================================================================
function renderTable(offers) {
  const tbody = document.getElementById('table-body');
  if (!offers.length) { tbody.innerHTML = ''; return; }
  const hidden = getHidden();

  tbody.innerHTML = offers.map(o => {
    const isHidden  = hidden.has(String(o.id));
    const kremlinStr = fmtDist(o.lat, o.lng);
    const color      = o.metro ? metroColor(o.metro) : '#9ca3af';
    const metroCell  = o.metro
      ? `<span style="display:inline-flex;align-items:center;gap:4px"><span class="metro-dot" style="background:${color}"></span>${o.metro}</span>`
      : '';
    const actionBtn = isHidden
      ? `<button class="tbl-restore" data-id="${o.id}">↩ Восстановить</button>`
      : `<button class="tbl-dismiss" data-id="${o.id}">✕ Скрыть</button>`;

    return `
    <tr${isHidden ? ' class="hidden-row"' : ''}>
      <td>${o.photo ? `<img src="${o.photo}" alt="фото" loading="lazy" onerror="this.style.display='none'">` : '—'}</td>
      <td>
        <div>${o.address || '—'}</div>
        ${metroCell}
      </td>
      <td><span class="price-cell">${fmt(o.price)}</span></td>
      <td>${o.area ? o.area + ' м²' : '—'}</td>
      <td>${o.floor && o.floors_total ? `${o.floor}/${o.floors_total}` : o.floor || '—'}</td>
      <td class="geo-cell">${kremlinStr || '—'}</td>
      <td><a href="${o.url}" target="_blank" rel="noopener">Открыть →</a></td>
      <td>${actionBtn}</td>
    </tr>`;
  }).join('');
}

// =====================================================================
// BOOST score (0–100)
// =====================================================================
function calcBoostScore(o) {
  let score = 0;

  // Расстояние до Кремля (макс 45)
  if (o.lat != null && o.lng != null) {
    const km = distKm(o.lat, o.lng);
    if      (km <= 2)  score += 45;
    else if (km <= 4)  score += 38;
    else if (km <= 6)  score += 30;
    else if (km <= 8)  score += 20;
    else if (km <= 10) score += 10;
  }

  // Метраж (макс 30)
  const area = o.area || 0;
  if      (area >= 80) score += 30;
  else if (area >= 60) score += 25;
  else if (area >= 50) score += 20;
  else if (area >= 40) score += 13;
  else                 score += 5;

  // Метро пешком (макс 15)
  if (o.walk_time != null) {
    const t = Number(o.walk_time);
    if      (t <= 3)  score += 15;
    else if (t <= 7)  score += 12;
    else if (t <= 12) score += 8;
    else if (t <= 20) score += 4;
  } else {
    score += 15; // нет данных о времени — нейтральный балл
  }

  // Комиссия (макс 10)
  if (o.commission != null) {
    const c = Number(o.commission);
    if      (c === 0)  score += 10;
    else if (c <= 50)  score += 6;
    else               score += 2;
  } else {
    score += 5; // нет данных
  }

  return score;
}

// =====================================================================
// Filter persistence
// =====================================================================
const FILTERS_KEY = 'flat_tracker_filters';

function saveFilters() {
  const state = {
    priceMin:   document.getElementById('price-min').value,
    priceMax:   document.getElementById('price-max').value,
    areaMin:    document.getElementById('area-min').value,
    dishwasher: document.getElementById('dishwasher-filter').checked,
    sort:       document.getElementById('sort-select').value,
  };
  localStorage.setItem(FILTERS_KEY, JSON.stringify(state));
}

function loadFilters() {
  let state;
  try { state = JSON.parse(localStorage.getItem(FILTERS_KEY) || 'null'); } catch { return; }
  if (!state) return;

  const priceMinEl = document.getElementById('price-min');
  const priceMaxEl = document.getElementById('price-max');
  const areaMinEl  = document.getElementById('area-min');
  const sortEl     = document.getElementById('sort-select');

  if (state.priceMin != null) {
    priceMinEl.value = state.priceMin;
    document.getElementById('price-min-val').textContent = Number(state.priceMin).toLocaleString('ru-RU') + ' ₽';
  }
  if (state.priceMax != null) {
    priceMaxEl.value = state.priceMax;
    document.getElementById('price-max-val').textContent = Number(state.priceMax).toLocaleString('ru-RU') + ' ₽';
  }
  if (state.areaMin != null) {
    areaMinEl.value = state.areaMin;
    document.getElementById('area-min-val').textContent = state.areaMin + ' м²';
  }
  if (state.dishwasher != null) document.getElementById('dishwasher-filter').checked = state.dishwasher;
  if (state.sort) {
    sortEl.value = state.sort;
    sortEl.classList.toggle('boost-active', state.sort === 'boost');
  }
  updatePriceTrack();
  updateAreaTrack();
}

// =====================================================================
// Apply filters + sort
// =====================================================================
function applyFilters() {
  const priceMin   = Number(document.getElementById('price-min').value);
  const priceMax   = Number(document.getElementById('price-max').value);
  const areaMin    = Number(document.getElementById('area-min').value);
  const dishwasher = document.getElementById('dishwasher-filter').checked;
  const sortVal    = document.getElementById('sort-select').value;
  const hidden     = getHidden();

  let filtered;
  if (activeTab === 'hidden') {
    filtered = allOffers.filter(o => hidden.has(String(o.id)));
  } else {
    filtered = allOffers.filter(o => {
      if (hidden.has(String(o.id)))      return false;
      if (o.lat != null && o.lng != null && distKm(o.lat, o.lng) > 10) return false;
      if (o.price && o.price < priceMin) return false;
      if (o.price && o.price > priceMax) return false;
      if (o.area  && o.area  < areaMin)  return false;
      if (dishwasher && !o.has_dishwasher) return false;
      return true;
    });
    if (activeTab !== 'new') {
      const filteredNewCount = filtered.filter(o => newIds.has(String(o.id))).length;
      const badge = document.getElementById('new-badge');
      badge.textContent = filteredNewCount;
      badge.style.display = filteredNewCount > 0 ? 'flex' : 'none';
    }
    if (activeTab === 'new') {
      filtered = filtered.filter(o => newIdsForFilter.has(String(o.id)));
    }
  }

  filtered.sort((a, b) => {
    if (sortVal === 'price-asc')  return (a.price || 0) - (b.price || 0);
    if (sortVal === 'price-desc') return (b.price || 0) - (a.price || 0);
    if (sortVal === 'area-desc')  return (b.area  || 0) - (a.area  || 0);
    if (sortVal === 'area-asc')   return (a.area  || 0) - (b.area  || 0);
    if (sortVal === 'kremlin-asc') {
      const da = (a.lat != null && a.lng != null) ? distKm(a.lat, a.lng) : Infinity;
      const db = (b.lat != null && b.lng != null) ? distKm(b.lat, b.lng) : Infinity;
      return da - db;
    }
    if (sortVal === 'boost') return calcBoostScore(b) - calcBoostScore(a);
    return 0;
  });

  document.getElementById('visible-count').textContent = filtered.length;
  const isEmpty = filtered.length === 0;
  document.getElementById('empty-msg').style.display  = isEmpty ? 'block' : 'none';
  document.getElementById('cards').style.display      = (!isEmpty && viewMode === 'cards') ? '' : 'none';
  document.getElementById('table-wrap').style.display = (!isEmpty && viewMode === 'table') ? '' : 'none';
  if (!isEmpty) viewMode === 'cards' ? renderCards(filtered) : renderTable(filtered);
  saveFilters();
}

// =====================================================================
// Event delegation — dismiss / restore
// =====================================================================
document.getElementById('cards').addEventListener('click', e => {
  const d = e.target.closest('.card-dismiss');
  if (d) { hideOffer(d.dataset.id); return; }
  const r = e.target.closest('.card-restore');
  if (r) restoreOffer(r.dataset.id);
});
document.querySelector('main').addEventListener('click', e => {
  const d = e.target.closest('.tbl-dismiss');
  if (d) { hideOffer(d.dataset.id); return; }
  const r = e.target.closest('.tbl-restore');
  if (r) restoreOffer(r.dataset.id);
});

// =====================================================================
// Tab bar
// =====================================================================
function setActiveTab(tab) {
  activeTab = tab;
  document.getElementById('tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('tab-new').classList.toggle('active', tab === 'new');
  document.getElementById('tab-hidden').classList.toggle('active', tab === 'hidden');
  applyFilters();
}

document.getElementById('tab-all').addEventListener('click', () => {
  setActiveTab('all');
});

document.getElementById('tab-new').addEventListener('click', () => {
  if (activeTab !== 'new') {
    newIdsForFilter = new Set(newIds);
    markAllSeen();
    newIds = new Set();
    document.getElementById('new-badge').style.display = 'none';
  }
  setActiveTab('new');
});

document.getElementById('tab-hidden').addEventListener('click', () => {
  setActiveTab('hidden');
});

// =====================================================================
// Price dual-range
// =====================================================================
const priceMinEl = document.getElementById('price-min');
const priceMaxEl = document.getElementById('price-max');
priceMinEl.addEventListener('input', function () {
  if (Number(this.value) > Number(priceMaxEl.value)) this.value = priceMaxEl.value;
  document.getElementById('price-min-val').textContent = Number(this.value).toLocaleString('ru-RU') + ' ₽';
  updatePriceTrack(); applyFilters(); saveFilters();
});
priceMaxEl.addEventListener('input', function () {
  if (Number(this.value) < Number(priceMinEl.value)) this.value = priceMinEl.value;
  document.getElementById('price-max-val').textContent = Number(this.value).toLocaleString('ru-RU') + ' ₽';
  updatePriceTrack(); applyFilters(); saveFilters();
});

// =====================================================================
// Area / dishwasher / sort / view
// =====================================================================
document.getElementById('area-min').addEventListener('input', function () {
  document.getElementById('area-min-val').textContent = this.value + ' м²';
  updateAreaTrack(); applyFilters(); saveFilters();
});
document.getElementById('dishwasher-filter').addEventListener('change', () => { applyFilters(); saveFilters(); });
document.getElementById('sort-select').addEventListener('change', function() {
  this.classList.toggle('boost-active', this.value === 'boost');
  applyFilters(); saveFilters();
});

// Filters dropdown toggle
const btnFilters   = document.getElementById('btn-filters');
const filtersPanel = document.getElementById('filters-panel');
const filtersArrow = document.getElementById('filters-arrow');
btnFilters.addEventListener('click', (e) => {
  e.stopPropagation();
  const open = filtersPanel.style.display === 'block';
  filtersPanel.style.display = open ? 'none' : 'block';
  filtersArrow.textContent   = open ? '▾' : '▴';
  btnFilters.style.borderColor = open ? '#d1d5db' : '#0f3460';
  btnFilters.style.color       = open ? '#555'    : '#0f3460';
});
document.addEventListener('click', () => {
  filtersPanel.style.display = 'none';
  filtersArrow.textContent   = '▾';
  btnFilters.style.borderColor = '#d1d5db';
  btnFilters.style.color       = '#555';
});
filtersPanel.addEventListener('click', e => e.stopPropagation());

// =====================================================================
// Load data
// =====================================================================
fetch('data.json')
  .then(r => { if (!r.ok) throw new Error(); return r.json(); })
  .then(data => {
    allOffers = data.offers || [];
    if (data.fetched_at) {
      // date available but not displayed in header
    }
    computeNewIds(); updateHiddenCount(); updatePriceTrack(); updateAreaTrack(); loadFilters(); applyFilters();
  })
  .catch(() => {
    document.getElementById('empty-msg').style.display = 'block';
    document.getElementById('empty-msg').textContent   = 'Файл data.json не найден. Сначала запустите parser.py';
  });

updatePriceTrack();
updateAreaTrack();
updateHiddenCount();
</script>
