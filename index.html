<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Аренда квартир — Москва</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      color: #fff;
      padding: 28px 32px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
    }

    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    header .badge {
      background: #e94560;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: .4px;
      white-space: nowrap;
    }
    header .meta {
      margin-left: auto;
      font-size: 0.8rem;
      opacity: .65;
    }

    /* ---- FILTER BAR ---- */
    .filter-bar {
      padding: 14px 32px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      flex-wrap: wrap;
      gap: 20px 32px;
      align-items: center;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-group > .filter-title {
      font-size: .82rem;
      font-weight: 600;
      color: #555;
      white-space: nowrap;
    }

    .filter-val {
      font-weight: 700;
      color: #0f3460;
      font-size: .82rem;
      white-space: nowrap;
      min-width: 74px;
    }

    .filter-sep { color: #aaa; font-size: .85rem; }

    /* dual range slider track fill */
    .range-track {
      position: relative;
      height: 4px;
      background: #e5e7eb;
      border-radius: 4px;
      width: 130px;
      align-self: center;
    }
    .range-track .track-fill {
      position: absolute;
      height: 100%;
      background: #0f3460;
      border-radius: 4px;
      pointer-events: none;
    }
    .range-track input[type=range] {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      cursor: pointer;
      margin: 0;
      padding: 0;
    }
    .range-track input[type=range]::-webkit-slider-thumb { width: 18px; height: 18px; }

    /* visible thumb overlays */
    .range-thumbs {
      position: relative;
      height: 16px;
      width: 130px;
      pointer-events: none;
    }
    .range-thumbs .thumb {
      position: absolute;
      width: 16px;
      height: 16px;
      background: #0f3460;
      border: 2px solid #fff;
      border-radius: 50%;
      top: 0;
      transform: translateX(-50%);
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
      pointer-events: none;
    }

    /* simple single range */
    input[type=range].simple-range {
      -webkit-appearance: none;
      appearance: none;
      width: 130px;
      height: 4px;
      background: linear-gradient(to right, #0f3460 0%, #0f3460 var(--pct, 50%), #e5e7eb var(--pct, 50%), #e5e7eb 100%);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
      border: none;
    }
    input[type=range].simple-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #0f3460;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
      cursor: pointer;
    }
    input[type=range].simple-range::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #0f3460;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
      cursor: pointer;
      border: none;
    }

    /* dual range wrapper */
    .dual-range {
      position: relative;
      width: 160px;
      height: 16px;
    }
    .dual-range .range-bg {
      position: absolute;
      top: 6px;
      left: 0;
      right: 0;
      height: 4px;
      background: #e5e7eb;
      border-radius: 4px;
      pointer-events: none;
    }
    .dual-range .range-active {
      position: absolute;
      top: 6px;
      height: 4px;
      background: #0f3460;
      border-radius: 4px;
      pointer-events: none;
    }
    .dual-range input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      position: absolute;
      width: 100%;
      height: 4px;
      top: 6px;
      background: transparent;
      outline: none;
      border: none;
      pointer-events: none;
      margin: 0;
      padding: 0;
    }
    .dual-range input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      pointer-events: all;
      width: 16px;
      height: 16px;
      background: #0f3460;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
      cursor: pointer;
    }
    .dual-range input[type=range]::-moz-range-thumb {
      pointer-events: all;
      width: 16px;
      height: 16px;
      background: #0f3460;
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
      cursor: pointer;
      border: 2px solid #fff;
    }

    /* checkbox */
    .filter-checkbox {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      font-size: .84rem;
      color: #333;
      user-select: none;
    }
    .filter-checkbox input[type=checkbox] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #0f3460;
    }

    /* ---- TOOLBAR ---- */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 32px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      flex-wrap: wrap;
    }

    .toolbar label { font-size: .85rem; color: #555; }

    .toolbar select {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: .85rem;
      outline: none;
      cursor: pointer;
    }

    .count-badge {
      margin-left: auto;
      background: #f0f2f5;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: .8rem;
      color: #555;
    }

    main { padding: 24px 32px; }

    /* ---- CARDS GRID ---- */
    #cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      transition: transform .18s, box-shadow .18s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,.13);
    }

    .card-img-wrap {
      position: relative;
      width: 100%;
      padding-top: 60%;
      background: #e5e7eb;
      overflow: hidden;
    }
    .card-img-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .4s;
    }
    .card:hover .card-img-wrap img { transform: scale(1.04); }

    .no-photo {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: .8rem;
      gap: 6px;
    }
    .no-photo svg { width: 40px; height: 40px; opacity: .4; }

    .card-price-tag {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(15, 52, 96, .88);
      color: #fff;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: .9rem;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .card-body {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .card-address {
      font-size: .88rem;
      font-weight: 600;
      line-height: 1.35;
      color: #1a1a2e;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }
    .pill {
      background: #f0f2f5;
      border-radius: 20px;
      padding: 2px 9px;
      font-size: .75rem;
      color: #555;
      white-space: nowrap;
    }
    .pill.metro { background: #e8f0fe; color: #1a73e8; }

    .card-desc {
      font-size: .78rem;
      color: #6b7280;
      line-height: 1.5;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      padding: 10px 16px 14px;
      border-top: 1px solid #f0f2f5;
    }
    .card-footer a {
      display: block;
      text-align: center;
      background: #0f3460;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      padding: 8px;
      font-size: .84rem;
      font-weight: 600;
      letter-spacing: .3px;
      transition: background .15s;
    }
    .card-footer a:hover { background: #e94560; }

    /* ---- TABLE VIEW ---- */
    #table-wrap { display: none; overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    thead th {
      background: #0f3460;
      color: #fff;
      padding: 12px 14px;
      text-align: left;
      font-size: .82rem;
      font-weight: 600;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #f0f2f5; transition: background .12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8faff; }
    td { padding: 10px 14px; font-size: .84rem; vertical-align: middle; }
    td img { width: 90px; height: 60px; object-fit: cover; border-radius: 6px; }
    td a { color: #0f3460; font-weight: 600; text-decoration: none; }
    td a:hover { color: #e94560; text-decoration: underline; }
    td .price-cell { font-weight: 700; white-space: nowrap; color: #0f3460; }

    /* toggle */
    .view-toggle {
      display: flex;
      gap: 4px;
      background: #f0f2f5;
      border-radius: 8px;
      padding: 3px;
    }
    .view-btn {
      border: none;
      background: transparent;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      color: #555;
      transition: background .15s, color .15s;
    }
    .view-btn.active { background: #fff; color: #0f3460; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
      font-size: 1rem;
    }

    @media (max-width: 600px) {
      header, .filter-bar, .toolbar, main { padding-left: 16px; padding-right: 16px; }
      header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Аренда 1-комнатных квартир · Москва</h1>
  <span class="badge">до 60 000 ₽</span>
  <span class="meta" id="fetched-at"></span>
</header>

<!-- ===== FILTER BAR ===== -->
<div class="filter-bar">

  <!-- Цена: двойной ползунок -->
  <div class="filter-group">
    <span class="filter-title">Цена:</span>
    <span class="filter-val" id="price-min-val">80 000 ₽</span>
    <div class="dual-range" id="dual-price">
      <div class="range-bg"></div>
      <div class="range-active" id="price-active-track"></div>
      <input type="range" id="price-min" min="80000" max="140000" step="1000" value="80000">
      <input type="range" id="price-max" min="80000" max="140000" step="1000" value="140000">
    </div>
    <span class="filter-val" id="price-max-val">140 000 ₽</span>
  </div>

  <!-- Площадь: одиночный ползунок -->
  <div class="filter-group">
    <span class="filter-title">Площадь от:</span>
    <input type="range" class="simple-range" id="area-min" min="20" max="100" step="1" value="50" style="--pct:50%">
    <span class="filter-val" id="area-min-val">50 м²</span>
  </div>

  <!-- Посудомоечная машина: чекбокс -->
  <div class="filter-group">
    <label class="filter-checkbox">
      <input type="checkbox" id="dishwasher-filter">
      Посудомоечная машина
    </label>
  </div>

</div>

<!-- ===== TOOLBAR ===== -->
<div class="toolbar">
  <label>Сортировка:</label>
  <select id="sort-select">
    <option value="price-asc">Цена ↑</option>
    <option value="price-desc">Цена ↓</option>
    <option value="area-desc">Площадь ↓</option>
    <option value="area-asc">Площадь ↑</option>
  </select>

  <span class="count-badge"><span id="visible-count">0</span> объявлений</span>

  <div class="view-toggle">
    <button class="view-btn active" id="btn-cards" title="Карточки">&#9646;&#9646;</button>
    <button class="view-btn" id="btn-table" title="Таблица">&#9776;</button>
  </div>
</div>

<main>
  <div id="cards"></div>
  <div id="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Фото</th>
          <th>Адрес / Метро</th>
          <th>Цена</th>
          <th>Площадь</th>
          <th>Этаж</th>
          <th>Ссылка</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
  <p class="empty" id="empty-msg" style="display:none">Нет объявлений по выбранным фильтрам.</p>
</main>

<script>
let allOffers = [];
let viewMode = 'cards'; // 'cards' | 'table'

// ---- helpers ----

function fmt(price) {
  if (!price) return '—';
  return Number(price).toLocaleString('ru-RU') + ' ₽/мес';
}

function noPhotoSvg() {
  return `<div class="no-photo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    Нет фото
  </div>`;
}

// ---- dual range price track fill ----

function updatePriceTrack() {
  const minEl = document.getElementById('price-min');
  const maxEl = document.getElementById('price-max');
  const track = document.getElementById('price-active-track');
  const min = Number(minEl.min), max = Number(minEl.max);
  const lo = Number(minEl.value), hi = Number(maxEl.value);
  const pctLo = (lo - min) / (max - min) * 100;
  const pctHi = (hi - min) / (max - min) * 100;
  track.style.left  = pctLo + '%';
  track.style.width = (pctHi - pctLo) + '%';
}

// ---- area slider fill ----

function updateAreaTrack() {
  const el = document.getElementById('area-min');
  const min = Number(el.min), max = Number(el.max), val = Number(el.value);
  const pct = (val - min) / (max - min) * 100;
  el.style.setProperty('--pct', pct + '%');
}

// ---- render ----

function renderCards(offers) {
  const container = document.getElementById('cards');
  if (!offers.length) { container.innerHTML = ''; return; }
  container.innerHTML = offers.map(o => `
    <div class="card">
      <div class="card-img-wrap">
        ${o.photo
          ? `<img src="${o.photo}" alt="фото" loading="lazy" onerror="this.parentNode.innerHTML='${noPhotoSvg().replace(/"/g, "'").replace(/\n/g, '')}'"/>`
          : noPhotoSvg()}
        <span class="card-price-tag">${fmt(o.price)}</span>
      </div>
      <div class="card-body">
        <div class="card-address">${o.address || '—'}</div>
        <div class="card-meta">
          ${o.metro ? `<span class="pill metro">м. ${o.metro}</span>` : ''}
          ${o.area ? `<span class="pill">${o.area} м²</span>` : ''}
          ${o.floor && o.floors_total ? `<span class="pill">${o.floor}/${o.floors_total} эт.</span>` : ''}
          ${o.rooms ? `<span class="pill">${o.rooms}-комн.</span>` : ''}
        </div>
        ${o.description ? `<p class="card-desc">${o.description}</p>` : ''}
      </div>
      <div class="card-footer">
        <a href="${o.url}" target="_blank" rel="noopener">Открыть объявление →</a>
      </div>
    </div>
  `).join('');
}

function renderTable(offers) {
  const tbody = document.getElementById('table-body');
  if (!offers.length) { tbody.innerHTML = ''; return; }
  tbody.innerHTML = offers.map(o => `
    <tr>
      <td>${o.photo
        ? `<img src="${o.photo}" alt="фото" loading="lazy" onerror="this.style.display='none'">`
        : '—'}</td>
      <td>
        <div>${o.address || '—'}</div>
        ${o.metro ? `<small style="color:#1a73e8">м. ${o.metro}</small>` : ''}
      </td>
      <td><span class="price-cell">${fmt(o.price)}</span></td>
      <td>${o.area ? o.area + ' м²' : '—'}</td>
      <td>${o.floor && o.floors_total ? `${o.floor}/${o.floors_total}` : o.floor || '—'}</td>
      <td><a href="${o.url}" target="_blank" rel="noopener">Открыть →</a></td>
    </tr>
  `).join('');
}

function applyFilters() {
  const priceMin   = Number(document.getElementById('price-min').value);
  const priceMax   = Number(document.getElementById('price-max').value);
  const areaMin    = Number(document.getElementById('area-min').value);
  const dishwasher = document.getElementById('dishwasher-filter').checked;
  const sortVal    = document.getElementById('sort-select').value;

  const dishRe = /посудомо(е|ё)чн|посудомойк/i;

  let filtered = allOffers.filter(o => {
    if (o.price && o.price < priceMin) return false;
    if (o.price && o.price > priceMax) return false;
    if (o.area  && o.area  < areaMin)  return false;
    if (dishwasher) {
      const desc = (o.description || '') + ' ' + (o.title || '');
      if (!dishRe.test(desc)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    if (sortVal === 'price-asc')  return (a.price || 0) - (b.price || 0);
    if (sortVal === 'price-desc') return (b.price || 0) - (a.price || 0);
    if (sortVal === 'area-desc')  return (b.area  || 0) - (a.area  || 0);
    if (sortVal === 'area-asc')   return (a.area  || 0) - (b.area  || 0);
    return 0;
  });

  document.getElementById('visible-count').textContent = filtered.length;

  const isEmpty = filtered.length === 0;
  document.getElementById('empty-msg').style.display   = isEmpty ? 'block' : 'none';
  document.getElementById('cards').style.display       = (!isEmpty && viewMode === 'cards') ? '' : 'none';
  document.getElementById('table-wrap').style.display  = (!isEmpty && viewMode === 'table') ? '' : 'none';

  if (!isEmpty) {
    if (viewMode === 'cards') renderCards(filtered);
    else renderTable(filtered);
  }
}

// ---- price dual-range logic ----

const priceMinEl = document.getElementById('price-min');
const priceMaxEl = document.getElementById('price-max');

priceMinEl.addEventListener('input', function() {
  const lo = Number(this.value), hi = Number(priceMaxEl.value);
  if (lo > hi) { this.value = hi; }
  document.getElementById('price-min-val').textContent =
    Number(this.value).toLocaleString('ru-RU') + ' ₽';
  updatePriceTrack();
  applyFilters();
});

priceMaxEl.addEventListener('input', function() {
  const hi = Number(this.value), lo = Number(priceMinEl.value);
  if (hi < lo) { this.value = lo; }
  document.getElementById('price-max-val').textContent =
    Number(this.value).toLocaleString('ru-RU') + ' ₽';
  updatePriceTrack();
  applyFilters();
});

// ---- area slider ----

document.getElementById('area-min').addEventListener('input', function() {
  document.getElementById('area-min-val').textContent = this.value + ' м²';
  updateAreaTrack();
  applyFilters();
});

// ---- dishwasher checkbox ----

document.getElementById('dishwasher-filter').addEventListener('change', applyFilters);

// ---- sort & view ----

document.getElementById('sort-select').addEventListener('change', applyFilters);

document.getElementById('btn-cards').addEventListener('click', () => {
  viewMode = 'cards';
  document.getElementById('btn-cards').classList.add('active');
  document.getElementById('btn-table').classList.remove('active');
  applyFilters();
});
document.getElementById('btn-table').addEventListener('click', () => {
  viewMode = 'table';
  document.getElementById('btn-table').classList.add('active');
  document.getElementById('btn-cards').classList.remove('active');
  applyFilters();
});

// ---- load data ----

fetch('data.json')
  .then(r => {
    if (!r.ok) throw new Error('data.json not found');
    return r.json();
  })
  .then(data => {
    allOffers = data.offers || [];

    if (data.fetched_at) {
      const d = new Date(data.fetched_at);
      document.getElementById('fetched-at').textContent =
        'Обновлено: ' + d.toLocaleString('ru-RU', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    }

    // Adjust price slider bounds to actual data range
    const prices = allOffers.map(o => o.price).filter(Boolean);
    if (prices.length) {
      const dataMin = Math.min(...prices);
      const dataMax = Math.max(...prices);
      const lo = Math.floor(dataMin / 1000) * 1000;
      const hi = Math.ceil(dataMax  / 1000) * 1000;
      [priceMinEl, priceMaxEl].forEach(el => {
        el.min = lo; el.max = hi; el.step = 1000;
      });
      priceMinEl.value = lo;
      priceMaxEl.value = hi;
      document.getElementById('price-min-val').textContent = lo.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('price-max-val').textContent = hi.toLocaleString('ru-RU') + ' ₽';
    }

    // Adjust area slider bounds
    const areas = allOffers.map(o => o.area).filter(Boolean);
    if (areas.length) {
      const areaEl = document.getElementById('area-min');
      const minArea = Math.floor(Math.min(...areas));
      const maxArea = Math.ceil(Math.max(...areas));
      areaEl.min = minArea;
      areaEl.max = maxArea;
      areaEl.value = minArea;
      document.getElementById('area-min-val').textContent = minArea + ' м²';
    }

    updatePriceTrack();
    updateAreaTrack();
    applyFilters();
  })
  .catch(() => {
    document.getElementById('empty-msg').style.display = 'block';
    document.getElementById('empty-msg').textContent =
      'Файл data.json не найден. Сначала запустите parser.py';
  });

// Initial track state
updatePriceTrack();
updateAreaTrack();
</script>
</body>
</html>
